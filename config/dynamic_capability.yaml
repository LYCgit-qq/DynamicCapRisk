# config/dynamic_capability.yaml

base_dir: "D:/Local/DynamicCapRisk/"

paths:
  ab_csv:            "output/1_capability_assessment/results/Ab_quantification.csv"
  abc_csv:           "output/1_capability_assessment/results/Abc_individualized_baseline_ability.csv"
  afl_pkl:           "output/1_capability_assessment/results/Afl_capability_fluctuation.pkl"
  subject_exp_csv:   "data/raw/被试-实验ID映射.csv"
  cluster_label_csv: "output/1_capability_assessment/results/Ab_cluster_labels.csv"
  output_dir: "output/1_capability_assessment/results"
  fig_dir:    "output/1_capability_assessment/figures"

calculation:
  # ── 基准能力模式 ──────────────────────────────────────────────────
  # Ab  : 聚类中心均值（高/中/低三值），计算快，组内无差异
  # Abc : 个体化基准能力（32名被试各一值），需先运行 baseline_capability.py
  # ab_mode: "Ab"
  ab_mode: "Abc"

  # ── Ad 输出区间（正态化后线性缩放到该范围） ───────────────────────
  # 建议保持 [0.50, 1.00] 与论文一致；如需收窄可改为 [0.55, 0.95]
  ad_output_min: 0.00
  ad_output_max: 1.00

  # ── A_fl 原始值转换参数（仅当 pkl 中存的是 S_fl 时生效） ──────────
  afl_coeff:  0.4
  afl_const: -0.2
  
  # 权重模式选择："fixed" (固定权重) 或 "objective" (CRITIC+熵权客观权重)
  weight_mode: "objective" 
  ad_weights:
    ab_weight: 0.3
    afl_weight: 0.7

plot:
  font_size:        10
  axes_label_size:  12
  tick_label_size:  10
  fig_size:         [8, 5]
  dpi:              300
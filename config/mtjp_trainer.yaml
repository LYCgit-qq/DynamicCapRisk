# ============================================================
# MT-JP 联合预测模型 — 训练器配置
# 对应脚本: src/4_prediction/trainer.py
# 注意：代码已移除内置默认配置，所有参数均依赖此YAML文件
# ============================================================

# -------------------------- 路径配置 --------------------------
paths:
  dataset_pkl: "data/dataset/mtjp_dataset_aug-False.pkl"  # 数据集PKL路径（需与dataset.py输出一致）
  runs_root:   "output/3_prediction/runs"                  # 所有训练运行的根目录（修正语法错误：移除多余双引号）

# -------------------------- 模型配置 --------------------------
model:
  seq_len:    5        # 历史步数 T（必须与 dataset.yaml 中 model.seq_len 一致）
  d_model:    128      # Transformer 隐藏维度（论文表5.3）
  nhead:      8        # 多头注意力头数（需满足 d_model % nhead == 0）
  num_layers: 4        # Transformer 编码器层数（论文表5.3）
  ffn_dim:    512      # 前馈网络维度（论文表5.3）
  dropout:    0.2      # Dropout 率（防止过拟合）
  n_classes:  3        # 风险等级分类数 {低:0, 中:1, 高:2}

# -------------------------- 训练配置 --------------------------
train:
  batch_size:  64      # 批次大小（论文表5.3）
  max_epochs:  150     # 最大训练轮数（论文表5.3）
  patience:    15      # 早停轮数（验证集损失连续不下降则停止，论文表5.3）
  grad_clip:   1.0     # 梯度裁剪阈值（防止梯度爆炸，论文表5.3）
  seed:        42      # 随机种子（保证结果可复现）

# -------------------------- 优化器配置 --------------------------
optimizer:
  lr:           1.0e-4    # 初始学习率（论文表5.3）
  weight_decay: 0.01      # 权重衰减（L2正则，论文表5.3）
  betas: [0.9, 0.999]     # AdamW 优化器 β系数（论文表5.3）

# -------------------------- 学习率调度器 --------------------------
scheduler:
  T_0:     20      # CosineAnnealingWarmRestarts 重启周期（论文§5.3.1）
  eta_min: 1.0e-6  # 最小学习率（论文§5.3.1）

# -------------------------- 损失函数配置 --------------------------
loss:
  # 损失项权重（论文§5.2.2 网格搜索确定）
  lambda_ability:     1.0     # 能力预测损失权重
  lambda_risk_reg:    1.0     # 风险回归损失权重
  lambda_risk_cls:    0.5     # 风险分类损失权重
  lambda_consistency: 0.3     # TCI一致性损失权重

  huber_delta: 0.05           # Huber损失阈值δ（论文§5.2.2）
  cls_weights: [1.0, 1.5, 2.0] # 分类交叉熵权重 [低,中,高]（平衡样本分布）
  # TCI一致性公式系数：R* = alpha·F_S - beta·(2·Ã_d - 1)（论文§5.2.2）
  tci_alpha: 0.58
  tci_beta:  0.42
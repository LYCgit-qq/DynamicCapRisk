# =============================================================================
# risk_validator.yaml
# R 有效性验证模块配置文件 (已修改：直接读取已有绩效文件)
# =============================================================================

# ── 路径配置 ──────────────────────────────────────────────────────────────
paths:
  # 新增：直接指向 capability_validator 输出的客观绩效文件
  performance_csv: "D:/Local/DynamicCapRisk/output/1_capability_assessment/validation/performance_metrics.csv"
  # 风险结果文件 (来自 risk_evaluator.py)
  risk_csv:   "D:/Local/DynamicCapRisk/output/2_risk_assessment/results/risk_windows_all.csv"
  # 输出目录
  output_dir: "D:/Local/DynamicCapRisk/output/2_risk_assessment/validation"

# ── 风险等级顺序（用于卡方检验分组展示）────────────────────────────────
risk_level_order:
  - "低风险"
  - "中风险"
  - "高风险"

# ── 图表输出配置 ──────────────────────────────────────────────────────────
figure:
  dpi: 150
  figsize_roc:      [6, 5]    # ROC 曲线图尺寸
  figsize_bar:      [6, 4]    # 风险等级柱状图尺寸
  figsize_box:      [5, 5]    # R 箱线图尺寸
  color_low_risk:   "#4CAF50"
  color_mid_risk:   "#FF9800"
  color_high_risk:  "#F44336"
  color_no_event:   "#90CAF9"
  color_event:      "#EF9A9A"
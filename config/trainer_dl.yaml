# /root/autodl-tmp/DynamicCapRisk/config/trainer_dl.yaml
# 风险预测模型配置（已移除能力预测分支）
# 切换模型只需修改 model.model_type：
#   mtrp      → 多模态Transformer风险预测模型（默认）
#   lstm      → 2-层 LSTM 基线
#   gru       → 2-层 GRU 基线
#   cnn_lstm  → CNN-LSTM 混合基线
# ──────────────────────────────────────────────────────────
# 消融实验快速切换（仅对 model_type=mtrp 生效）：
#
#   model.ablation 可选值：
#     none            → 完整 MT-RP（默认）
#     no_cross_attn   → 移除交叉注意力（RiskBranch 改为线性层）
#     single_modal    → 仅使用行为特征，跳过融合层
#     early_fusion    → 早期融合（18维直接输入单一编码器）
#     late_fusion     → 晚期融合（四路各自预测后均值融合）

# -------------------------- 路径配置 --------------------------
paths:
  dataset_pkl: "data/dataset/dataset_aug-False.pkl"
  runs_root:   "output/3_prediction/runs"

# -------------------------- 模型配置 --------------------------
model:
  model_type: "mtrp"
  ablation: "no_cross_attn"
  seq_len:    5
  input_dim:  18
  n_classes:  3
  dropout:    0.25

  # MT-RP 参数
  d_model:    64
  nhead:      4
  num_layers: 2
  ffn_dim:    256

  # 基线模型参数
  baseline_hidden:     128
  baseline_num_layers: 2
  baseline_cnn_channels: 64
  baseline_cnn_layers:   2
  baseline_kernel_size:  3
  baseline_lstm_hidden:  128

# -------------------------- 训练配置 --------------------------
train:
  batch_size:  256
  max_epochs:  100
  patience:    20
  grad_clip:   1.0
  seed:        42
  num_workers: 8

# -------------------------- 优化器配置 --------------------------
optimizer:
  lr:           8.0e-4
  weight_decay: 0.05
  betas: [0.9, 0.999]

# -------------------------- 学习率调度器 --------------------------
scheduler:
  type: "cosine"
  T_max: 100
  eta_min: 1.0e-5

# -------------------------- 损失函数配置 --------------------------
loss:
  lambda_risk_reg: 1.0
  lambda_risk_cls: 1.2
  cls_weights: [1.0, 1.0, 1.0]
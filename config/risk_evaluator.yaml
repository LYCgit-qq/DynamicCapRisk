# D:\Local\DynamicCapRisk\config\risk_evaluator.yaml

# ── 模型参数 ──────────────────────────────
model:
  # 计算方法选择 tci=论文相对失配比 | linear=原线性加权
  method:       tci     # 可选 tci / linear
  ad_min:       0.43    # 仅 linear 方法使用
  ad_max:       1.08    # 仅 linear 方法使用
  alpha:        0.58    # 仅 linear 方法使用
  beta:         0.42    # 仅 linear 方法使用
  # R = 2R - 0.16
  thresh_high:  0.10    # 高风险阈值 θ
  thresh_low:  -0.10    # 低风险阈值 -θ
  fs_baseline:  null    # label=0 自由路段基线场强
  force_normalize_r: true  # 是否强制R归一化到[0,1]
  use_fixed_threshold: false # 风险阈值：true=使用yaml固定阈值 | false=使用数据70/95分位自动阈值

# ── 场景标签映射 ──────────────────────────────────────────────
scenarios:
  label_csv_map:
    1: 'Fs_work_zone_1.csv'
    2: 'Fs_work_zone_2.csv'
    3: 'Fs_work_zone_3.csv'
  label_name:
    0: '基线场景'
    1: '施工区1'
    2: '施工区2'
    3: '施工区3'

# ── 路径配置 ──────────────────────────────────────────────────
paths:
  field_pkl:   'output/1_capability_assessment/results/Afl_capability_fluctuation.pkl'
  ad_pkl:      'output/1_capability_assessment/results/Ad_result.pkl'
  fs_dir: "output/2_risk_assessment/results"  
  output_csv: "output/2_risk_assessment/results"
  output_fig: "output/2_risk_assessment/figures"
  performance_csv: "output/1_capability_assessment/validation/performance_metrics.csv"

# ── 可视化样式 ────────────────────────────────────────────────
vis:
  dpi: 180
  font_sans_serif: ['SimHei', 'Microsoft YaHei', 'DejaVu Sans']

  group_colors:
    高能力组: '#2196F3'
    中能力组: '#FF9800'
    低能力组: '#F44336'

  scene_bg_colors:
    0: '#d0e8ff'
    1: '#ffe0b2'
    2: '#ffccbc'
    3: '#ef9a9a'

  risk_level_colors:
    低风险: '#66BB6A'
    中风险: '#FFA726'
    高风险: '#EF5350'

# ── 权重校准网格搜索 ──────────────────────────────────────────
calibration:
  alpha_range: [0.01, 0.99]   # 搜索范围 [lo, hi]
  alpha_step:  0.01
  ci_auc_drop: 0.01           # 95% CI 定义：AUC ≥ best_auc - ci_auc_drop

# ── 阈值敏感性分析 ────────────────────────────────────────────
threshold_search:
  range: [0.05, 0.25]
  step:  0.05

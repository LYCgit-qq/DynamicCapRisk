# /root/autodl-tmp/DynamicCapRisk/config/evaluator.yaml
# 对应脚本: src/3_prediction/evaluator.py

# -------------------------- 路径配置 --------------------------
paths:
  dataset_pkl: "data/dataset/dataset_aug-False.pkl"
  ckpt:        "/root/autodl-tmp/DynamicCapRisk/output/3_prediction/runs/20260416_172929_mtrp/best_model.pt"
  # ckpt:        null  # 自动评估最新 pt
  output_dir:  "output/3_prediction"

# -------------------------- 评估配置 --------------------------
eval:
  batch_size:       256     # 推理批次大小
  split:            "test"  # 评估集：train / val / test
  risk_thresh_high:  0.1    # 高风险阈值（R > 0.1）
  risk_thresh_low:  -0.1    # 低风险阈值（R < -0.1）

# -------------------------- 分类标签 --------------------------
class_names: ["低风险", "中风险", "高风险"]

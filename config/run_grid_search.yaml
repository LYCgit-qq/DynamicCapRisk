# ===================== 网格搜索核心配置 =====================
# 项目根目录（固定路径）
project_root: "/root/autodl-tmp/DynamicCapRisk"

# 基础训练配置文件路径
base_config_path: "../../config/trainer_dl.yaml"

# 【修正】训练脚本正确相对路径（基于项目根目录）
train_script: "src/3_prediction/trainer_dl.py"

# 最大并行进程数
max_parallel_workers: 4

# ===================== 多版本参数网格配置 =====================
# 当前激活使用的参数版本
active_param_version: "v5"

# 多版本参数网格（可无限扩展版本）
param_grids:
  # 版本1：全模型搜索
  v1:
    "model.model_type": ["mtrp", "lstm", "gru", "cnn_lstm"]
    "optimizer.lr": [5e-4, 8e-4, 1e-3]
    "train.batch_size": [128, 256]
    "model.dropout": [0.2, 0.25, 0.3]
    "loss.lambda_risk_cls": [1.0, 1.2, 1.5]
    "model.baseline_hidden": [64, 128]
    "model.d_model": [64, 128]
  
  # 版本2：小维度+小批次 最优探索
  v2:
    "model.model_type": ["mtrp"]
    "optimizer.lr": [0.0008, 0.001, 0.0012]
    "train.batch_size": [64, 128]
    "model.dropout": [0.2, 0.25]
    "loss.lambda_risk_cls": [1.1, 1.2, 1.3]
    "model.baseline_hidden": [32, 64]
    "model.d_model": [32, 64]
  
  # 版本3：极致最优探索（mtrp专用）
  v3:
    "model.model_type": ["mtrp"]
    "optimizer.lr": [0.0012, 0.0015, 0.0018, 0.002, 0.0025]
    "train.batch_size": [32, 64]
    "model.dropout": [0.25, 0.3, 0.35, 0.4, 0.45]
    "loss.lambda_risk_cls": [1.0, 1.1, 1.2, 1.3, 1.4]
    "model.baseline_hidden": [16, 32]
    "model.d_model": [16, 32]

  # 版本4：LSTM / GRU 专用搜索（无CNN参数，绝不报错）
  v4:
    "model.model_type": ["lstm", "gru"]
    "optimizer.lr": [0.0008, 0.001, 0.0012]
    "train.batch_size": [32, 64]
    "model.dropout": [0.25, 0.3, 0.35, 0.4]
    "loss.lambda_risk_cls": [1.0, 1.1, 1.2, 1.4]
    "model.baseline_hidden": [16, 32, 64]
    "model.baseline_num_layers": [1, 2]

  # 版本5：CNN-LSTM 专用搜索（可放心探索CNN两个参数！）
  v5:
    "model.model_type": ["cnn_lstm"]
    "optimizer.lr": [0.0008, 0.001, 0.0012]
    "train.batch_size": [32, 64]
    "model.dropout": [0.25, 0.3, 0.35, 0.4]
    "loss.lambda_risk_cls": [1.0, 1.1, 1.2, 1.4]
    "model.baseline_lstm_hidden": [16, 32, 64]
    "model.baseline_cnn_channels": [32, 64]
    "model.baseline_kernel_size": [3, 5]

  # 版本6：MTRP核心消融实验 + 全范围安全参数探索（论文终极版）
  v6:
    "model.model_type": ["mtrp"]
    # ✅ 学习率：v2全最优区间（0.0008/0.001/0.0012），禁止≥0.0015
    "optimizer.lr": [0.001, 0.0012, 0.0015]
    # ✅ 批次：唯一最优，永久固定
    "train.batch_size": [64]
    # ✅ Dropout：全低正则安全区间（0.15/0.2/0.25），禁止≥0.3
    "model.dropout": [0.15, 0.2, 0.25]
    # ✅ 损失系数：最优平衡区间（无扩展，完美值）
    "loss.lambda_risk_cls": [1.0, 1.1, 1.2]
    # ✅ 无敏感参数：全范围探索（16/32/64，性能无差异）
    "model.baseline_hidden": [16, 32, 64]
    # ✅ 模型维度：最优32 + 小维度16（v3验证过，安全）
    "model.d_model": [32]
    # ✅ 核心5组消融（完全不变，保证结构验证）
    "model.ablation": ["none", "no_cross_attn", "single_modal", "early_fusion", "late_fusion"]
# 风险场强计算配置文件
# Risk Field Calculation Configuration

# ============= 权重系数（来自论文AHP-熵权组合赋权）=============
weights:
  # 综合场强权重
  w_veh:  0.50    # 车辆交互权重（略降，为标志牌让权）
  w_geo:  0.22    # 道路几何权重
  w_sign: 0.28    # 道路设施权重（↑ 提升标志牌影响力）

  # 道路设施子项权重
  lambda_1: 0.65  # 标志影响权重（↑）
  lambda_2: 0.35  # 施工区存在权重

# ============= 道路几何特征赋值规则 =============
geometry:
  # 曲率等级映射
  curvature_map:
    straight: 0.0    # 直线
    cross:    0.5    # 十字路口
    bend:     1.0    # 弯道

  # 车道数量赋值（逆向：车道越少赋值越高）
  lane_map:
    1: 1.0
    2: 0.5
    4: 0.0

  # 车道宽度赋值（基于车道数推断）
  lane_width_map:
    4: 0.0
    2: 0.5
    1: 1.0

  # 几何类型切换的平滑范围（m）
  # 值越大，直线→弯道等切换越柔和；建议 20~50 m
  smooth_sigma: 30.0

# ============= 道路设施场强参数 =============
sign_field:
  # 标志牌非对称衰减距离（m）
  sigma_front: 120.0   # 前方（车辆接近时）感知范围，衰减慢
  sigma_back:   40.0   # 后方（车辆已过）衰减范围，衰减快

  # 施工区边界软化宽度（m）
  # 将进出施工区的 0/1 硬跳变平滑为 S 形过渡，建议 15~30 m
  wz_smooth_sigma: 20.0

# ============= 车辆交互场强参数 =============
vehicle_interaction:
  baseline:         0.30   # 基线：无施工区直道
  work_zone:        0.65   # 施工区内
  complex_geometry: 0.85   # 施工区 + 弯道/路口

  # 施工区/几何边界平滑宽度（m）
  # 将阶跃赋值改为连续过渡，建议 20~35 m
  boundary_smooth_sigma: 25.0

  # 入口汇道高斯峰
  entry_peak:   0.98    # 峰值（叠加到基础场强上取最大值）
  entry_sigma:  25.0    # 高斯峰半宽（m），控制峰的胖瘦
  entry_offset: -15.0   # 峰心相对入口的偏移（m），负值=偏向入口前方

# ============= 场强等级划分 =============
field_levels:
  low:         [0.0, 0.3]
  medium:      [0.3, 0.5]
  medium_high: [0.5, 0.7]
  high:        [0.7, 1.0]

# ============= 计算参数 =============
calculation:
  window_size: 100    # 保留（兼容旧代码，当前未使用）

  # 综合场强 F_S 的最终轻量平滑（m）
  # 消除各分量归一化后残余的微小锯齿，不改变宏观形态
  # 建议 5~15 m；设为 0 可关闭
  final_smooth_sigma: 8.0

# ============= 路径配置 =============
paths:
  input_dir: "data/processed"
  output_dir: "output/2_risk_assessment/results"
  vis_dir: "output/2_risk_assessment/figures"

# ============= 场景配置 =============
scenarios:
  default:
    - test00
    - test01
    - test02
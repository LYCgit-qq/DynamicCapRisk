# D:\Local\DynamicCapRisk\config\risk_field.yaml
# 贴合论文《风险场强量化方法》第4章的配置

# ============= 核心开关 =============
# 论文明确使用 CRITIC-熵权组合赋权法，故设为 true
use_critic_entropy: true

# ============= 权重系数 =============
weights:
  # --- 综合场强顶层权重 (论文表4.2) ---
  w_veh:  0.53    # 车辆交互 (影响最显著)
  w_geo:  0.25    # 道路几何 (静态条件最突出)
  w_sign: 0.22    # 道路设施 (静态环境基础影响)

  # --- 道路设施场强 (s_sign) 子项权重 (默认值，CRITIC启用时会被覆盖) ---
  lambda_1: 0.60  # 标志密度 (默认)
  lambda_2: 0.40  # 施工区状态 (默认)

  # --- 车辆交互场强 (s_veh) 子项权重 (预留，当前逻辑不使用) ---
  mu_1: 0.40      # 跟车时距 (仅预留)
  mu_2: 0.35      # 侧向密度 (仅预留)
  mu_3: 0.25      # 速度差 (仅预留)

  # --- 道路几何场强 (s_geo) 子项权重 (预留，CRITIC启用时自动计算) ---
  nu_1: 0.45      # 曲率 (默认)
  nu_2: 0.30      # 车道宽度 (默认)
  nu_3: 0.25      # 车道数 (默认)

# ============= 道路几何特征赋值规则 =============
geometry:
  curvature_map:
    straight: 0.0
    cross:    0.5
    bend:     1.0
  lane_map:
    1: 1.0
    2: 0.5
    4: 0.0
  lane_width_map:
    4: 0.0
    2: 0.5
    1: 1.0
  smooth_sigma: 30.0

# ============= 道路设施场强参数 =============
sign_field:
  sigma_front: 120.0
  sigma_back:   40.0
  wz_smooth_sigma: 20.0

# ============= 车辆交互场强参数 (保持原有逻辑) =============
vehicle_interaction:
  baseline:         0.30
  work_zone:        0.65
  complex_geometry: 0.85
  boundary_smooth_sigma: 25.0
  entry_peak:       0.98
  entry_sigma:      25.0
  entry_offset:    -15.0

# ============= 场强等级划分 (贴合论文表4.3) =============
field_levels:
  low:         [0.0, 0.3]    # F_S < 0.3
  medium:      [0.3, 0.55]   # 0.3 ≤ F_S < 0.55
  medium_high: [0.55, 0.75]  # 0.55 ≤ F_S < 0.75
  high:        [0.75, 1.0]   # F_S ≥ 0.75

# ============= 计算参数 =============
calculation:
  window_size: 100
  final_smooth_sigma: 8.0
  adjust_distribution: false  # 是否启用F_S分布微调（抬升低风险值）
  force_normalize_fs: false  # 是否强制F_S归一化到[0,1]
  enable_tail_fix: false    # 是否启用右尾修正（压缩过高风险值）

# ============= 路径配置 =============
paths:
  input_dir:  "data/processed"
  output_dir: "output/2_risk_assessment/results"
  vis_dir:    "output/2_risk_assessment/figures"

# ============= 场景配置 (贴合论文4类典型场景) =============
scenarios:
  default:
    - work_zone_1    # 施工区1：管制车道缩减型
    - work_zone_2    # 施工区2：几何场强车道偏移型
    - work_zone_3    # 施工区3：中央车道封闭长曲线型

# ============= 基线场景预设数值 =============
baseline_stats:
  s_geo_mean: 0.10
  s_sign_mean: 0.15
  s_veh_mean: 0.05
  F_S_mean: 0.12
  field_level: "低"
# ============================================================
# MT-JP 联合预测模型 — 数据集构建配置
# 对应脚本: src/4_prediction/dataset.py
# 注意：代码已移除内置默认配置，所有参数均依赖此YAML文件
# ============================================================

# -------------------------- 路径配置 --------------------------
paths:
  raw_pkl:       "data/processed/raw_data.pkl"               # 原始多模态信号（act/eye/phy）
  cap_pkl:       "output/1_capability_assessment/Afl_capability_fluctuation.pkl"  # 能力波动结果
  risk_csv:      "output/2_risk_assessment/results/risk_windows_all.csv"          # 风险评估结果
  output_pkl:    "data/dataset/dataset"                 # 输出数据集PKL（自动拼接增强参数+后缀）
  output_stats:  "data/dataset/dataset_stats"           # 输出特征统计CSV（自动拼接增强参数+后缀）

# -------------------------- 窗口配置 --------------------------
window:
  window_seconds: 3       # 单个评估窗口时长（秒）
  act_hz:  60             # 行为信号采样率（Hz）→ 单窗口数据点：60*3=180
  eye_hz: 120             # 眼动信号采样率（Hz）→ 单窗口数据点：120*3=360
  phy_hz: 100             # 生理信号采样率（Hz）→ 单窗口数据点：100*3=300

# -------------------------- 模型输入配置 --------------------------
model:
  seq_len: 5              # 历史输入步数（T）→ 5*3s=15s历史，预测未来3s（第6步）

# -------------------------- 数据集划分 --------------------------
split:
  train_ratio: 0.70       # 训练集比例（按驾驶人分层）
  val_ratio:   0.10       # 验证集比例
  test_ratio:  0.20       # 测试集比例
  seed: 42                # 随机种子（保证划分结果可复现）

# -------------------------- 特征标准化 --------------------------
normalization:
  zscore: true            # 是否对输入特征做Z-score标准化
  # 说明：F_S（第17维，环境特征）已归一化至[0,1]，不参与标准化；统计量仅从训练集计算

# -------------------------- 数据增强配置 --------------------------
# 增强时机：Z-score标准化前执行，仅作用于训练集，增强样本追加到原始训练集后
augmentation:
  enabled:       true      # 增强总开关（true=启用 / false=关闭）
  only_on_train: true     # 仅对训练集增强（val/test集始终不增强）

  # 各增强方法配置（enabled=true才会生效）
  methods:
    # 1. 高斯噪声：模拟传感器随机误差
    gaussian_noise:
      enabled:   true
      std_scale: 0.05     # 噪声强度：std = |特征均值| × 0.05
      prob:      1.0      # 训练样本被选中增强的概率（1.0=所有样本都加噪声）

    # 2. 时间扭曲：模拟驾驶行为的时间弹性变化
    time_warp:
      enabled:   true
      sigma:     0.2      # 扭曲幅度（越大扭曲越强，建议0.1~0.3）
      prob:      0.5      # 训练样本被选中扭曲的概率

    # 3. 窗口裁剪：随机截取片段后插值回原长度（当前禁用）
    window_slice:
      enabled:   false
      slice_ratio: 0.9    # 保留的时间步比例（0.9=保留90%）
      prob:      0.3      # 训练样本被选中裁剪的概率

    # 4. 特征随机置零：模拟传感器缺失/遮挡
    feature_dropout:
      enabled:   true
      drop_prob: 0.1      # 单特征维度被置零的概率（仅前16维多模态特征，F_S不变）
      prob:      0.5      # 训练样本被选中置零的概率

    # 5. 幅值扭曲：模拟生理/行为的个体幅度差异
    magnitude_warp:
      enabled:   true
      sigma:     0.1      # 缩放曲线抖动幅度（建议0.05~0.2）
      prob:      0.5      # 训练样本被选中幅值扭曲的概率

    # 6. Mixup：跨样本线性插值（当前禁用）
    mixup:
      enabled:   false
      alpha:     0.4      # Beta分布参数（alpha=0.4时插值更平缓）
      prob:      0.3      # 训练样本被选中mixup的概率

# -------------------------- 标签映射 --------------------------
risk_level_map:
  "低风险": 0             # 风险分类标签映射（数值化）
  "中风险": 1
  "高风险": 2

# -------------------------- 全局参数 --------------------------
n_samples: 67             # 驾驶人总数（需与能力评估模块结果一致）
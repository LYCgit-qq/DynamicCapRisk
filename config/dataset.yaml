# /root/autodl-tmp/DynamicCapRisk/config/dataset.yaml
# MT-RP 联合预测模型 — 数据集构建配置

# -------------------------- 路径配置 --------------------------
paths:
  # raw_pkl:       "data/processed/raw_data.pkl"               # 原始多模态信号（act/eye/phy）
  raw_pkl:       "data/processed/raw_data_17.pkl"
  cap_pkl:       "output/1_capability_assessment/results/Afl_capability_fluctuation.pkl"  # 能力波动结果
  risk_csv:      "output/2_risk_assessment/results/risk_windows_all.csv"          # 风险评估结果
  output_pkl:    "data/dataset/dataset"                 # 输出数据集PKL（自动拼接增强参数+后缀）
  output_stats:  "data/dataset/dataset_stats"           # 输出特征统计CSV（自动拼接增强参数+后缀）

# -------------------------- 窗口配置 --------------------------
window:
  window_seconds: 3       # 单个评估窗口时长（秒）
  act_hz:  60             # 行为信号采样率（Hz）→ 单窗口数据点：60*3=180
  eye_hz: 120             # 眼动信号采样率（Hz）→ 单窗口数据点：120*3=360
  phy_hz: 100             # 生理信号采样率（Hz）→ 单窗口数据点：100*3=300

# -------------------------- 模型输入配置 --------------------------
model:
  seq_len: 5              # 历史输入步数（T）→ 5*3s=15s历史，预测未来3s（第6步）

# -------------------------- 数据集划分 --------------------------
split:
  train_ratio: 0.70       # 训练集比例（按驾驶人分层）
  val_ratio:   0.10       # 验证集比例
  test_ratio:  0.20       # 测试集比例
  seed: 42                # 随机种子（保证划分结果可复现）

# -------------------------- 特征标准化 --------------------------
normalization:
  zscore: true            # 是否对输入特征做Z-score标准化
  # 说明：F_S（第17维，环境特征）已归一化至[0,1]，不参与标准化；统计量仅从训练集计算

# -------------------------- 数据增强配置 --------------------------
# 增强时机：Z-score标准化前执行，仅作用于训练集，增强样本追加到原始训练集后
augmentation:
  enabled:       true       # 增强总开关【必须改为true】
  only_on_train: true     # 仅对训练集增强（val/test集始终不增强）

# -------------------------- 数据增强配置 --------------------------
augmentation:
  enabled:       false      # 打开总开关
  only_on_train: true

  # 类别平衡增强（针对风险分类标签 risk_cls）
  class_balance:
    enabled: true          # 是否启用类别平衡过采样
    # 每类目标样本数 = 训练集中最多类的原始样本数 × multiplier
    # 若 multiplier × max_count <= 该类原始数量，则该类不增强
    multiplier:
      low:    1          # 低风险 (risk_cls=0)，通常是多数类，保持 1.0
      medium: 1          # 中风险 (risk_cls=1)，过采样到 max_count × 1.0
      high:   1          # 高风险 (risk_cls=2)，过采样到 max_count × 1.0
    max_rounds: 20         # 每类最多增强轮数（防死循环）

  methods:
    gaussian_noise:   { enabled: true,  std_scale: 0.05, prob: 1.0 }
    time_warp:        { enabled: true,  sigma: 0.2,      prob: 0.5 }
    window_slice:     { enabled: false, slice_ratio: 0.9, prob: 0.3 }
    feature_dropout:  { enabled: true,  drop_prob: 0.1,  prob: 0.5 }
    magnitude_warp:   { enabled: true,  sigma: 0.1,      prob: 0.5 }
    mixup:            { enabled: false, alpha: 0.4,      prob: 0.3 }

# -------------------------- 标签映射 --------------------------
risk_level_map:
  "低风险": 0             # 风险分类标签映射（数值化）
  "中风险": 1
  "高风险": 2

# -------------------------- 全局参数 --------------------------
n_samples: 67             # 驾驶人总数（需与能力评估模块结果一致）
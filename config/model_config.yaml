# 模型配置文件（对应论文第5章）

# MT-JP模型架构参数
model:
  name: "MT-JP"  # Multimodal Transformer for Joint Prediction
  
  # 输入参数
  input:
    time_window: 30  # 时间窗口长度
    feature_dims:
      behavior: 8  # 操纵行为特征维度（3个操纵+3个车辆响应+2个交互）
      eye: 2  # 眼动认知特征维度
      physio: 2  # 生理状态特征维度
      env: 1  # 环境特征维度（风险场强）
    total_features: 13
  
  # Transformer编码器参数
  encoder:
    num_layers: 4  # 编码器层数
    hidden_dim: 128  # 隐藏层维度
    num_heads: 8  # 注意力头数
    ffn_dim: 512  # 前馈网络维度
    dropout: 0.2  # Dropout率
    
  # 位置编码
  positional_encoding:
    type: "learnable"  # 可学习的位置编码
    max_len: 30
  
  # 融合层参数
  fusion:
    method: "cross_modal_attention"  # 跨模态注意力
    fusion_dim: 128
  
  # 预测分支
  prediction_heads:
    # 能力预测分支
    capability:
      hidden_dims: [128, 64]
      activation: "relu"
      output_activation: "sigmoid"
      output_dim: 1
    
    # 风险预测分支
    risk:
      # 回归任务
      regression:
        hidden_dim: 128
        output_activation: "tanh"
        output_dim: 1
      # 分类任务
      classification:
        hidden_dim: 128
        num_classes: 3  # 高、中、低
        output_activation: "softmax"
  
  # 交叉注意力参数
  cross_attention:
    enabled: true
    num_heads: 8
    dropout: 0.1

# 损失函数参数
loss:
  # 多任务学习权重
  weights:
    capability: 1.0  # λ1
    risk_regression: 1.0  # λ2
    risk_classification: 0.5  # λ3
    consistency: 0.3  # λ4
  
  # 能力预测损失（Huber Loss）
  capability_loss:
    type: "huber"
    delta: 0.05  # 阈值参数
  
  # 风险回归损失（MSE）
  risk_regression_loss:
    type: "mse"
  
  # 风险分类损失（加权交叉熵）
  risk_classification_loss:
    type: "weighted_cross_entropy"
    class_weights: [1.0, 1.5, 2.0]  # [低, 中, 高]
  
  # 一致性约束损失
  consistency_loss:
    type: "mse"
    tci_alpha: 0.58  # TCI模型权重系数α
    tci_beta: 0.42  # TCI模型权重系数β

# 训练参数
training:
  # 优化器
  optimizer:
    type: "adamw"
    lr: 1.0e-4  # 初始学习率
    betas: [0.9, 0.999]
    weight_decay: 0.01
  
  # 学习率调度
  scheduler:
    type: "cosine_annealing_warm_restarts"
    eta_min: 1.0e-6
    T_max: 20  # 周期长度
    T_mult: 1
  
  # 训练设置
  batch_size: 64
  num_epochs: 150
  early_stopping:
    enabled: true
    patience: 15
    min_delta: 0.0001
  
  # 梯度裁剪
  gradient_clipping:
    enabled: true
    max_norm: 1.0
  
  # 数据划分
  data_split:
    train: 0.7  # 70% - 22名驾驶人
    val: 0.1  # 10% - 5名驾驶人
    test: 0.2  # 20% - 5名驾驶人
    stratify_by: "capability_level"  # 按基准能力等级分层

# 评估指标
evaluation:
  capability_metrics:
    - "mae"  # 平均绝对误差
    - "rmse"  # 均方根误差
    - "r2"  # 决定系数
  
  risk_regression_metrics:
    - "mae"
    - "rmse"
    - "r2"
  
  risk_classification_metrics:
    - "accuracy"  # 准确率
    - "precision"  # 精确率
    - "recall"  # 召回率
    - "f1"  # F1分数
    - "confusion_matrix"  # 混淆矩阵
    - "high_risk_recall"  # 高风险召回率

# 检查点保存
checkpoint:
  save_dir: "checkpoints/"
  save_best: true
  save_last: true
  save_frequency: 10  # 每10个epoch保存一次

# 日志
logging:
  log_dir: "logs/"
  tensorboard: true
  log_interval: 10  # 每10个batch记录一次

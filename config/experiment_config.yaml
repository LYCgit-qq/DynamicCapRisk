# 实验配置文件（对应论文第2章）

# 数据采集参数
data:
  # 采样率
  driving_simulator_freq: 60  # Hz - 驾驶模拟器采样频率
  eye_tracking_freq: 120  # Hz - 眼动追踪采样频率  
  physio_freq: 500  # Hz - 生理信号采样频率
  
  # 时间窗口
  time_window: 30  # 秒 - 时间窗口长度（对应3秒的10倍）
  
  # 场景设置
  scenarios:
    - name: "baseline"
      description: "自由驾驶基线场景"
      length: 450  # 米
      lanes: 8
      traffic_density: 15  # 辆/km/车道
      
    - name: "work_zone_1"
      description: "施工区1-管制车道缩减型"
      length: 900  # 米
      lanes_before: 4
      lanes_after: 2
      traffic_density: 40
      
    - name: "work_zone_2"
      description: "施工区2-几何场强车道偏移型"
      length: 1300  # 米
      lanes: 4
      traffic_density: 50
      curve: true
      
    - name: "work_zone_3"
      description: "施工区3-中央车道封闭与长曲线型"
      length: 850  # 米
      lanes: 4
      traffic_density: 30
      long_curve: true

# 数据预处理参数
preprocessing:
  # 异常值处理
  outlier_detection:
    method: "3sigma"  # 3σ准则
    lof_neighbors: 20  # LOF算法邻居数
  
  # 标准化方法
  normalization: "z-score"  # Z-score标准化
  
  # 插值方法
  interpolation: "cubic_spline"  # 三次样条插值
  missing_threshold: 0.05  # 缺失率阈值（5%）
  
  # 滤波参数
  filters:
    ecg:  # 心电信号
      type: "bandpass"
      low_freq: 0.5
      high_freq: 30
    eda:  # 皮肤电导
      type: "bandpass"
      low_freq: 0.01
      high_freq: 1.0
    savgol:  # Savitzky-Golay滤波器
      window_length: 11
      polyorder: 3

# 参与者信息
participants:
  total_count: 32
  male_count: 16
  female_count: 16
  age_range: [21, 30]
  age_mean: 23.8
  age_std: 2.3

# 文件路径
paths:
  raw_data: "data/raw/"
  processed_data: "data/processed/"
  questionnaire: "data/raw/questionnaire.csv"
  output: "data/processed/"
